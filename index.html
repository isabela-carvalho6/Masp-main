<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MASP - Página Principal</title>

  <!-- CSS CORRETO -->
  <link rel="stylesheet" href="./css/style.css">

  <script src="https://kit.fontawesome.com/7a9d0c9fd8.js" crossorigin="anonymous"></script>
</head>

<body>

  <div class="site-container">

    <!-- TOPO -->
    <header class="top-bar">
      <a 
        href="https://www.bilheteria.masp.org.br/pt-BR"
        class="fake-url"
        target="_blank"
      >
        https://www.bilheteria.masp.org.br/pt-BR
      </a>

      <div class="top-links">
        <!-- VAI PARA HOME -->
        <a href="./home.html">Cadastre-se</a>
        <span>|</span>
        <a href="./home.html">Login</a>
      </div>
    </header>

    <!-- MENU -->
    <nav class="menu">
      <a href="./index.html" class="active">Home</a>
      <span>|</span>
      <a href="./regras.html">Regras</a>
    </nav>

    <!-- CONTEÚDO -->
    <section class="hero-box">

      <div class="hero-header">
        <span>MASP</span>
      </div>

      <div class="hero-content">

        <!-- IMAGEM -->
        <div class="hero-image">
          <img src="./img/masp-principal.jpg" alt="Museu MASP">
        </div>

        <!-- TEXTO -->
        <div class="hero-text">
          <h1>Desperte o Artista</h1>

          <p>
            🎉 Parabéns, aspirante a artista! Você conquistou a chance de mostrar seu talento.
          </p>

          <a href="./regras.html" class="btn-regras">
            Siga as regras
          </a>
        </div>

      </div>
    </section>

    <!-- CARDS -->
    <section class="cards-links">

      <!-- INSTAGRAM -->
      <a href="https://www.instagram.com/masp/" target="_blank" class="info-card">
        <i class="fa-brands fa-instagram"></i>
        <span>Instagram</span>
      </a>

      <!-- CADASTRO (AGORA CERTO) -->
      <a href="./home.html" class="info-card">
        <i class="fa-regular fa-pen-to-square"></i>
        <span>Cadastre-se</span>
      </a>

    </section>

  </div>

</body>
</html>
