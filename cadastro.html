<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - MASP</title>
    <link rel="stylesheet" href="css/cadastro.css">
</head>
<body>

    <div class="container">

        <h1>Cadastre sua Arte</h1>
        <p class="sub">Preencha suas informações e envie sua criação artística.</p>

        <form id="formCadastro">

            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" required>

            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" maxlength="14" required placeholder="000.000.000-00">

            <label for="numero">Número:</label>
            <input type="text" id="numero" required placeholder="(xx) xxxxx-xxxx">

            <label for="email">E-mail:</label>
            <input type="email" id="email" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" required>

            <label for="fileInput">Envie sua Arte:</label>
            <div class="file-wrapper">
                <input type="file" id="fileInput" accept="image/*" required>
            </div>

            <button type="submit" class="btn">Concluído</button>

        </form>

    </div>

    <script src="js/cadastro.js"></script>
</body>
</html>
